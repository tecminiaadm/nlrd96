<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>AgendaFácil</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #0a0c10;
      color: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,107,107,0.2);
      border-top-color: #FF6B6B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #8892a4; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Carregando...</p>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCuX3SRhDvZS_BiKIL1q_VFwacMBwZ5tbU",
      authDomain: "appagenda-f278b.firebaseapp.com",
      projectId: "appagenda-f278b",
      storageBucket: "appagenda-f278b.firebasestorage.app",
      messagingSenderId: "676987896115",
      appId: "1:676987896115:web:74ecdbedabca34f5923e46"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async user => {
      if (!user) {
        // Não está logado → vai para login
        window.location.replace('login.html');
        return;
      }

      try {
        const docSnap = await db.collection('usuarios').doc(user.uid).get();

        if (!docSnap.exists) {
          // Documento não encontrado → volta para login para recriar
          window.location.replace('login.html');
          return;
        }

        const data = docSnap.data();

        if (data.role === 'admin') {
          window.location.replace('admin.html');
        } else {
          window.location.replace('painel.html');
        }
      } catch (e) {
        console.error('Erro ao verificar sessão:', e);
        window.location.replace('login.html');
      }
    });
  </script>
</body>
</html>
